repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run --no-sync ruff check --force-exclude
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run --no-sync ruff format --force-exclude
        types_or: [python, pyi]
        require_serial: true
      - id: check-preamble
        name: check that python files start with license comment
        language: system
        entry: uv run --no-sync scripts/check_file_headers
        types: [python]
        files: 'yuio/.*'
        exclude: '^(yuio/_dist/.*|yuio/_version.py)'
  - repo: https://github.com/taminomara/cl-keeper
    rev: v1.0.0
    hooks:
      - id: clk
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "^test/regression_data/.*$"
      - id: end-of-file-fixer
        exclude: "^test/regression_data/.*$"
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-vcs-permalinks
